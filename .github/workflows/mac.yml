name: Build macOS App (AutoGuard)

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-macos:
    runs-on: macos-latest
    environment: PW6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Rust target (ARM64)
        run: rustup target add aarch64-apple-darwin

      - name: Install dependencies
        run: |
          brew update
          brew install gtk4 pkg-config dylibbundler coreutils

      - name: Build (release)
        env:
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create app bundle
        run: |
          APP_NAME=AutoGuard
          BUNDLE=bundle/$APP_NAME.app
          CONTENTS=$BUNDLE/Contents

          mkdir -p $CONTENTS/{MacOS,Resources,Frameworks}

          cp target/aarch64-apple-darwin/release/$APP_NAME \
             $CONTENTS/MacOS/$APP_NAME

          cat > $CONTENTS/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>$APP_NAME</string>
              <key>CFBundleExecutable</key>
              <string>$APP_NAME</string>
              <key>CFBundleIdentifier</key>
              <string>com.example.$APP_NAME</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
          </dict>
          </plist>
          EOF

      - name: Bundle GTK libraries
        run: |
          APP=bundle/AutoGuard.app
          MACOS=$APP/Contents/MacOS
          FRAMEWORKS=$APP/Contents/Frameworks

          dylibbundler \
            -od -b \
            -x $MACOS/AutoGuard \
            -d $FRAMEWORKS \
            -p @executable_path/../Frameworks

      - name: Bundle GTK resources
        run: |
          RES=bundle/AutoGuard.app/Contents/Resources

          mkdir -p $RES/share
          mkdir -p $RES/lib

          cp -r /opt/homebrew/share/glib-2.0 $RES/share/

          mkdir -p $RES/lib/gdk-pixbuf-2.0/2.10.0/loaders
          cp /opt/homebrew/lib/gdk-pixbuf-2.0/2.10.0/loaders/libpixbufloader-png.dylib \
             $RES/lib/gdk-pixbuf-2.0/2.10.0/loaders/ || true
          cp /opt/homebrew/lib/gdk-pixbuf-2.0/2.10.0/loaders/libpixbufloader-jpeg.dylib \
             $RES/lib/gdk-pixbuf-2.0/2.10.0/loaders/ || true

          glib-compile-schemas $RES/share/glib-2.0/schemas

      - name: Fix library paths
        run: |
          install_name_tool -add_rpath \
            "@executable_path/../Frameworks" \
            bundle/AutoGuard.app/Contents/MacOS/AutoGuard

      - name: Import signing certificate
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -A
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 7200 build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}

      - name: Sign dylibs
        run: |
          APP=bundle/AutoGuard.app
          FRAMEWORKS=$APP/Contents/Frameworks

          find "$FRAMEWORKS" -type f -name "*.dylib" | while read f; do
            codesign --force --options runtime --timestamp \
              --sign "$SIGNING_IDENTITY" "$f"
          done
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}

      - name: Sign app bundle
        run: |
          codesign --force --options runtime --timestamp \
            --sign "$SIGNING_IDENTITY" bundle/AutoGuard.app
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}

      - name: Create zip for notarization
        run: |
          cd bundle
          zip -r ../AutoGuard.app.zip AutoGuard.app

      - name: Notarize app
        id: notarize
        run: |
          xcrun notarytool submit AutoGuard.app.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait \
            --output-format json > notarization.json

          echo "id=$(jq -r '.id' notarization.json)" >> $GITHUB_OUTPUT
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}

      - name: Fetch notarization log
        run: |
          xcrun notarytool log "${{ steps.notarize.outputs.id }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$TEAM_ID"
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}

      - name: Staple notarization
        run: xcrun stapler staple "bundle/AutoGuard.app"

      - name: Upload notarized app artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoGuard-macOS
          path: AutoGuard.app.zip
